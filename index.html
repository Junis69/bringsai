<body style="background:#ffffff;margin:0">
  <div id="root" style="background:#ffffff;min-height:100vh"></div>
  <script>
    // Unregister any stale service workers that may be caching old files
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(registration) {
          registration.unregister();
        });
      });
    }
    // Clear old caches (from potential PWA/service worker)
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(name) { caches.delete(name); });
      });
    }
    // Debug: catch JS errors that prevent React from mounting
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('root');
      if (el && !el.children.length) {
        el.innerHTML = '<div style="color:red;padding:40px;font-size:14px;font-family:monospace;word-break:break-all">'
          + '<b>JS Error:</b><br>' + escHtml(msg) + '<br><br><b>File:</b> ' + escHtml(url) + ':' + escHtml(line) + ':' + escHtml(col)
          + (err && err.stack ? '<br><br><b>Stack:</b><br>' + escHtml(err.stack) : '') + '</div>';
      }
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('root');
      if (el && !el.children.length) {
        el.innerHTML = '<div style="color:red;padding:40px;font-size:14px;font-family:monospace;word-break:break-all">'
          + '<b>Promise Error:</b><br>' + escHtml(e.reason ? (e.reason.message || e.reason) : 'Unknown') + '</div>';
      }
    });
  </script>
